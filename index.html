<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lax Scout — 2025-26</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}
.auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.auth-box{background:#161b22;border:1px solid #30363d;border-radius:16px;padding:36px;width:min(380px,100%);text-align:center}
.auth-box h2{font-size:18px;font-weight:700;margin-bottom:6px}
.auth-box p{font-size:13px;color:#8b949e;margin-bottom:24px}
.auth-box input{width:100%;background:#0d1117;color:#e6edf3;border:1px solid #30363d;padding:10px 14px;border-radius:8px;font-size:14px;font-family:inherit;margin-bottom:12px}
.auth-box input:focus{outline:none;border-color:#58a6ff}
.auth-box button{width:100%;background:#58a6ff;color:#0d1117;border:none;padding:10px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.auth-box button:hover{background:#79c0ff}
.auth-err{color:#f85149;font-size:12px;margin-top:8px;display:none}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:14px}
.spinner{width:32px;height:32px;border:3px solid #21262d;border-top-color:#58a6ff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen p{font-size:13px;color:#8b949e}
.app{display:none}
.topbar{background:#161b22;border-bottom:1px solid #21262d;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:50}
.topbar-left h1{font-size:15px;font-weight:700}
.topbar-left p{font-size:11px;color:#8b949e;margin-top:2px}
.topbar-right{display:flex;align-items:center;gap:10px}
.game-badge{background:#1a3a1a;color:#3fb950;padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;border:1px solid #2a5a2a}
.logout-btn{background:none;border:1px solid #30363d;color:#8b949e;padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit}
.logout-btn:hover{border-color:#f85149;color:#f85149}
.controls{padding:14px 24px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;border-bottom:1px solid #21262d}
.controls-left{display:flex;gap:8px;flex-wrap:wrap;align-items:center;flex:1}
.filter-btn{padding:6px 16px;border-radius:20px;border:1px solid #30363d;background:transparent;color:#8b949e;font-size:12px;font-weight:600;cursor:pointer;transition:all .18s;font-family:inherit}
.filter-btn:hover{border-color:#58a6ff;color:#58a6ff}
.filter-btn.on{background:#58a6ff;color:#0d1117;border-color:#58a6ff}
.sep{width:1px;height:20px;background:#30363d;margin:0 4px}
.game-selector{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.game-selector label{font-size:12px;color:#8b949e;white-space:nowrap}
.game-select{background:#21262d;color:#e6edf3;border:1px solid #30363d;padding:6px 10px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit}
.game-select:focus{outline:none;border-color:#58a6ff}
.action-btns{display:flex;gap:8px;flex-wrap:wrap}
.ctrl-btn{padding:6px 14px;border-radius:8px;border:1px solid #30363d;background:transparent;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .18s}
.ctrl-btn.green{color:#8b949e}.ctrl-btn.green:hover{border-color:#3fb950;color:#3fb950}
.ctrl-btn.orange{color:#8b949e}.ctrl-btn.orange:hover{border-color:#f0883e;color:#f0883e}
.ctrl-btn.red{color:#8b949e}.ctrl-btn.red:hover{border-color:#f85149;color:#f85149}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;padding:20px 24px}
.card{background:#161b22;border:1px solid #21262d;border-radius:14px;overflow:hidden;transition:border-color .18s,transform .15s}
.card:hover{border-color:#30363d;transform:translateY(-2px)}
.card.expanded{border-color:#58a6ff}
.card-header{padding:14px 16px 10px;display:flex;align-items:flex-start;gap:12px}
.avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;margin-top:2px}
.av-A{background:#3a1a00;color:#ff8c00}.av-M{background:#1a3a1a;color:#3fb950}
.av-D{background:#001a3a;color:#58a6ff}.av-G{background:#2a003a;color:#d2a8ff}
.card-name{font-size:14px;font-weight:700}
.card-sub{font-size:11px;color:#8b949e;margin-top:2px}
.pos-pill{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;margin-left:6px;vertical-align:middle}
.pill-A{background:#3a1a00;color:#ff8c00}.pill-M{background:#1a3a1a;color:#3fb950}
.pill-D{background:#001a3a;color:#58a6ff}.pill-G{background:#2a003a;color:#d2a8ff}
.blurb{margin:0 16px 10px;padding:10px 12px;background:#0d1117;border-radius:8px;border-left:3px solid #30363d}
.blurb-text{font-size:11px;color:#8b949e;line-height:1.55}
.nba-comp{font-size:10px;color:#58a6ff;margin-top:5px;font-weight:600}
.nba-comp span{color:#8b949e;font-weight:400}
.radar-wrap{padding:4px 16px 6px;display:flex;justify-content:center}
.radar-wrap canvas{max-height:170px}
.stat-strip{display:grid;gap:1px;background:#21262d;border-top:1px solid #21262d;border-bottom:1px solid #21262d}
.stat-strip.cols-4{grid-template-columns:repeat(4,1fr)}
.stat-box{background:#161b22;padding:10px 6px;text-align:center}
.stat-val{font-size:18px;font-weight:700}
.stat-lbl{font-size:9px;color:#8b949e;text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.pct-section{padding:10px 16px 4px}
.pct-section-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#484f58;margin-bottom:8px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.bar-lbl{font-size:11px;color:#8b949e;width:90px;flex-shrink:0}
.bar-track{flex:1;height:5px;background:#21262d;border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .5s ease}
.bar-val{font-size:11px;font-weight:600;width:34px;text-align:right;flex-shrink:0}
.dodge-section{padding:2px 16px 6px}
.dodge-expand-btn{background:none;border:none;color:#58a6ff;font-size:10px;font-weight:600;cursor:pointer;padding:4px 0;font-family:inherit;white-space:nowrap;display:block}
.dodge-expand-btn:hover{color:#79c0ff}
.dodge-detail{display:none;padding-bottom:8px}
.dodge-detail.open{display:block}
.dodge-dir-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px}
.dodge-dir{background:#0d1117;border-radius:8px;padding:8px 10px;border:1px solid #21262d}
.dodge-dir-lbl{font-size:10px;color:#8b949e;margin-bottom:4px}
.dodge-dir-pct{font-size:20px;font-weight:700}
.dodge-dir-sub{font-size:10px;color:#484f58;margin-top:2px}
.dodge-dir-bar{height:3px;border-radius:2px;margin-top:6px}
.tendency{font-size:10px;color:#8b949e;margin-top:8px;padding:4px 0}
.goalie-strip{padding:10px 16px 14px}
.goalie-stat-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #21262d;font-size:12px}
.goalie-stat-row:last-child{border-bottom:none}
.goalie-lbl{color:#8b949e}
.expand-btn{width:100%;background:none;border:none;border-top:1px solid #21262d;color:#8b949e;font-size:11px;font-weight:600;cursor:pointer;padding:9px;text-align:center;font-family:inherit;transition:background .15s}
.expand-btn:hover{background:#1c2128;color:#e6edf3}
.full-detail{display:none;padding:12px 16px 14px;border-top:1px solid #21262d}
.full-detail.open{display:block}
.fd-grid{display:grid;grid-template-columns:1fr 1fr}
.fd-col{padding-right:12px}
.fd-col:last-child{padding-right:0;padding-left:12px;border-left:1px solid #21262d}
.fd-section-hdr{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#484f58;padding:8px 0 4px;border-bottom:1px solid #21262d;margin-bottom:2px}
.fd-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #1c2128;font-size:12px}
.fd-row:last-child{border-bottom:none}
.fd-lbl{color:#8b949e}
.fd-val{font-weight:600}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;overflow-y:auto;padding:40px 16px}
.modal-bg.open{display:block}
.modal{background:#161b22;border:1px solid #30363d;border-radius:16px;width:min(820px,100%);margin:0 auto;padding:24px;position:relative}
.modal-title{font-size:16px;font-weight:700;margin-bottom:4px}
.modal-sub{font-size:12px;color:#8b949e;margin-bottom:18px}
.modal-close{position:absolute;top:20px;right:20px;background:none;border:none;font-size:22px;cursor:pointer;color:#8b949e;line-height:1;font-family:inherit}
.modal-close:hover{color:#e6edf3}
.form-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.form-field{display:flex;flex-direction:column;gap:4px}
.form-field label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#8b949e}
.form-field input,.form-field select{background:#0d1117;color:#e6edf3;border:1px solid #30363d;padding:7px 10px;border-radius:8px;font-size:12px;font-family:inherit}
.form-field input:focus{outline:none;border-color:#58a6ff}
.form-section-hdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#484f58;padding:10px 0 8px;border-bottom:1px solid #21262d;margin-bottom:10px}
.player-rows{display:flex;flex-direction:column;gap:4px;max-height:380px;overflow-y:auto;margin-bottom:14px}
.pfr{background:#0d1117;border-radius:8px;padding:8px 10px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.pfr-name{font-size:12px;font-weight:600;width:130px;flex-shrink:0}
.pfr-field{display:flex;flex-direction:column;align-items:center;gap:2px}
.pfr-field input{background:#161b22;color:#e6edf3;border:1px solid #30363d;padding:4px;border-radius:6px;font-size:11px;width:38px;text-align:center;font-family:inherit}
.pfr-field input:focus{outline:none;border-color:#58a6ff}
.pfr-field span{font-size:9px;color:#484f58}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;align-items:center;flex-wrap:wrap}
.btn-save{padding:8px 22px;border-radius:8px;border:none;background:#58a6ff;color:#0d1117;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-save:hover{background:#79c0ff}
.btn-save:disabled{opacity:.5;cursor:not-allowed}
.btn-cancel{padding:8px 22px;border-radius:8px;border:1px solid #30363d;background:transparent;color:#8b949e;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-cancel:hover{color:#e6edf3}
.btn-del{padding:8px 22px;border-radius:8px;border:1px solid #f85149;background:transparent;color:#f85149;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-right:auto}
.btn-del:hover{background:#f85149;color:#0d1117}
.modal-msg{font-size:12px;margin-top:8px;text-align:right;min-height:16px}
.modal-msg.err{color:#f85149}.modal-msg.ok{color:#3fb950}
.toast{position:fixed;bottom:24px;right:24px;background:#161b22;border:1px solid #30363d;border-radius:10px;padding:12px 18px;font-size:13px;font-weight:600;z-index:400;transform:translateY(80px);opacity:0;transition:all .3s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-color:#2a5a2a;color:#3fb950}
.toast.error{border-color:#5a2a2a;color:#f85149}
.empty-state{padding:60px 24px;text-align:center;color:#484f58;font-size:14px}
</style>
</head>
<body>

<div id="authScreen" class="auth-screen">
  <div class="auth-box">
    <h2>Lax Scout 2025-26</h2>
    <p>Enter your coach access code to continue</p>
    <input type="password" id="passInput" placeholder="Access code" onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()">Enter</button>
    <div class="auth-err" id="authErr">Incorrect code — try again</div>
  </div>
</div>

<div id="loadScreen" class="loading-screen" style="display:none">
  <div class="spinner"></div>
  <p>Loading season data...</p>
</div>

<div class="app" id="app">
  <div class="topbar">
    <div class="topbar-left">
      <h1>Scout Cards — 2025-26</h1>
      <p id="topSub">Loading...</p>
    </div>
    <div class="topbar-right">
      <span class="game-badge" id="recordBadge">0-0</span>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
  </div>

  <div class="controls">
    <div class="controls-left">
      <button class="filter-btn on" onclick="setFilter('ALL',this)">All</button>
      <button class="filter-btn" onclick="setFilter('A',this)">Attack</button>
      <button class="filter-btn" onclick="setFilter('M',this)">Midfield</button>
      <button class="filter-btn" onclick="setFilter('D',this)">Defense</button>
      <button class="filter-btn" onclick="setFilter('G',this)">Goalie</button>
      <div class="sep"></div>
      <div class="game-selector">
        <label>View:</label>
        <select class="game-select" id="gameSelect" onchange="onGameChange()">
          <option value="season">Full season</option>
        </select>
      </div>
    </div>
    <div class="action-btns">
      <button class="ctrl-btn orange" id="editBtn" style="display:none" onclick="openEdit()">Edit game</button>
      <button class="ctrl-btn red"    id="delBtn"  style="display:none" onclick="deleteSelected()">Delete game</button>
      <button class="ctrl-btn green" onclick="openAdd()">+ Add game</button>
    </div>
  </div>

  <div class="grid" id="grid"><div class="empty-state">Loading...</div></div>
</div>

<div class="modal-bg" id="modalBg" onclick="handleModalBgClick(event)">
  <div class="modal" id="modalInner">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-title" id="modalTitle">Add game</div>
    <div class="modal-sub" id="modalSub">Enter stats for each player</div>
    <div class="form-row">
      <div class="form-field"><label>Opponent</label><input id="fOpp" placeholder="e.g. Arrowhead"></div>
      <div class="form-field"><label>Date</label><input id="fDate" type="date"></div>
      <div class="form-field"><label>Result (e.g. W 8-4)</label><input id="fResult" placeholder="W 8-4"></div>
    </div>
    <div class="form-section-hdr">Player stats — this game only</div>
    <div class="player-rows" id="pRows"></div>
    <div class="modal-actions">
      <button class="btn-del" id="modalDelBtn" style="display:none" onclick="deleteFromModal()">Delete this game</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="saveBtn" onclick="saveGame()">Save game</button>
    </div>
    <div class="modal-msg" id="modalMsg"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://cecmgubbtjigmmvtggdm.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNlY21ndWJidGppZ21tdnRnZ2RtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMDU1MjAsImV4cCI6MjA5MTg4MTUyMH0.riOOS-PsIxVtfhrQuusDevAztGARRCDLo2lcLBz1SwU';
const ACCESS_CODE  = 'LaxCoach2025';

// ── AUTH ──────────────────────────────────────────────────────────────────────
function login(){
  if(document.getElementById('passInput').value===ACCESS_CODE){
    sessionStorage.setItem('lax_auth','1');
    document.getElementById('authScreen').style.display='none';
    document.getElementById('loadScreen').style.display='flex';
    initApp();
  } else {
    document.getElementById('authErr').style.display='block';
    document.getElementById('passInput').value='';
  }
}
function logout(){ sessionStorage.removeItem('lax_auth'); location.reload(); }

// ── SUPABASE ──────────────────────────────────────────────────────────────────
async function sbFetch(path, opts={}){
  const r = await fetch(SUPABASE_URL+'/rest/v1/'+path, {
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':opts.prefer||''},
    ...opts
  });
  if(!r.ok) throw new Error(await r.text());
  return r.status===204 ? null : r.json();
}
const db = {
  get:(t,q='')   => sbFetch(t+(q?'?'+q:'')),
  post:(t,b,p)   => sbFetch(t,{method:'POST', body:JSON.stringify(b), prefer:p||'return=representation'}),
  patch:(t,q,b)  => sbFetch(t+'?'+q,{method:'PATCH', body:JSON.stringify(b), prefer:'return=representation'}),
  del:(t,q)      => sbFetch(t+'?'+q,{method:'DELETE'})
};

// ── STATE ─────────────────────────────────────────────────────────────────────
let ROSTER=[], GAMES=[], posFilter='ALL', curIdxs=[], nbaMap={}, editId=null;
const rCharts={};

// ── HELPERS ───────────────────────────────────────────────────────────────────
const pct=(a,b)=>b?Math.round(a/b*100):null;
const posN=(p)=>p==='Midfield'?'M':p;
const posL=(p)=>({M:'Mid',A:'Attack',D:'Defense',G:'Goalie'}[posN(p)]||p);
const ini=(n)=>n.split(' ').map(w=>w[0]).join('').slice(0,2);
const bClr=(v)=>v===null?'#484f58':v>=70?'#3fb950':v>=50?'#f0883e':'#f85149';
function toast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+type;setTimeout(()=>t.className='toast',3000);}

// ── DATA MAPPING ──────────────────────────────────────────────────────────────
function mapRow(s){
  return {goals:s.goals||0,assists:s.assists||0,sog:s.sog||0,soff:s.soff||0,fpa:s.fpa||0,fpg:s.fpg||0,
    dlAtt:s.dl_att||0,dlSuc:s.dl_suc||0,drAtt:s.dr_att||0,drSuc:s.dr_suc||0,
    passAtt:s.pass_att||0,passCmp:s.pass_cmp||0,drops:s.drops||0,
    toUnf:s.to_unf||0,toFrc:s.to_frc||0,gbWon:s.gb_won||0,gbLost:s.gb_lost||0,
    dcWon:s.dc_won||0,dcLost:s.dc_lost||0,ct:s.ct||0,ints:s.ints||0,
    dodgeOn:s.dodge_on||0,dodgeBlk:s.dodge_blk||0,fouls:s.fouls||0,yellowCards:s.yellow_cards||0,
    clrAtt:s.clr_att||0,clrSuc:s.clr_suc||0,fd:s.fd||0,
    saves:s.saves||0,goalsAllowed:s.goals_allowed||0,gso:s.gso||0,gsoAllowed:s.gso_allowed||0};
}
function toRow(jersey,gameId,s){
  return {game_id:gameId,jersey,goals:s.goals,assists:s.assists,sog:s.sog,soff:s.soff,fpa:s.fpa,fpg:s.fpg,
    dl_att:s.dlAtt,dl_suc:s.dlSuc,dr_att:s.drAtt,dr_suc:s.drSuc,pass_att:s.passAtt,pass_cmp:s.passCmp,drops:s.drops,
    to_unf:s.toUnf,to_frc:s.toFrc,gb_won:s.gbWon,gb_lost:s.gbLost,dc_won:s.dcWon,dc_lost:s.dcLost,
    ct:s.ct,ints:s.ints,dodge_on:s.dodgeOn,dodge_blk:s.dodgeBlk,fouls:s.fouls,yellow_cards:s.yellowCards,
    clr_att:s.clrAtt,clr_suc:s.clrSuc,fd:s.fd,saves:s.saves,goals_allowed:s.goalsAllowed,gso:s.gso,gso_allowed:s.gsoAllowed};
}

// ── LOAD ──────────────────────────────────────────────────────────────────────
async function initApp(){
  try {
    ROSTER = await db.get('roster','order=jersey.asc');
    const games = await db.get('games','order=date.asc');
    const allStats = await db.get('player_stats','select=*');
    const byGame={};
    allStats.forEach(s=>{if(!byGame[s.game_id])byGame[s.game_id]={};byGame[s.game_id][s.jersey]=mapRow(s);});
    GAMES = games.map(g=>({id:g.id,opponent:g.opponent,date:g.date,result:g.result,stats:byGame[g.id]||{}}));
    document.getElementById('loadScreen').style.display='none';
    document.getElementById('app').style.display='block';
    buildOptions();
    curIdxs=GAMES.map((_,i)=>i);
    buildGrid();
    updateTop();
  } catch(e){
    document.getElementById('loadScreen').innerHTML=`<p style="color:#f85149;text-align:center;padding:20px">Failed to connect to database.<br><small>${e.message}</small></p>`;
  }
}

async function refresh(){
  const games = await db.get('games','order=date.asc');
  const allStats = await db.get('player_stats','select=*');
  const byGame={};
  allStats.forEach(s=>{if(!byGame[s.game_id])byGame[s.game_id]={};byGame[s.game_id][s.jersey]=mapRow(s);});
  GAMES=games.map(g=>({id:g.id,opponent:g.opponent,date:g.date,result:g.result,stats:byGame[g.id]||{}}));
  buildOptions();
  curIdxs=GAMES.map((_,i)=>i);
  document.getElementById('gameSelect').value='season';
  onGameChange();
}

// ── MERGE ─────────────────────────────────────────────────────────────────────
function mergeStats(idxs){
  const keys=['goals','assists','sog','soff','fpa','fpg','dlAtt','dlSuc','drAtt','drSuc','passAtt','passCmp','drops','toUnf','toFrc','gbWon','gbLost','dcWon','dcLost','ct','ints','dodgeOn','dodgeBlk','fouls','yellowCards','clrAtt','clrSuc','fd','saves','goalsAllowed','gso','gsoAllowed'];
  const out={};
  ROSTER.forEach(r=>{
    const m={}; keys.forEach(k=>m[k]=0);
    idxs.forEach(i=>{const s=GAMES[i]?.stats[r.jersey];if(s)keys.forEach(k=>m[k]+=(s[k]||0));});
    out[r.jersey]=m;
  });
  return out;
}

// ── NBA COMPS ─────────────────────────────────────────────────────────────────
const COMPS=[
  {name:'Nikola Jokic',    desc:'Elite scorer who elevates everyone with pinpoint passing and vision.',         score:s=>{const sp=pct(s.goals,s.sog+s.soff)??0,pp=pct(s.passCmp,s.passAtt)??0;return(s.goals>=2?sp:0)+(pp>=85&&s.passAtt>8?pp*.5:0)+s.assists*8;},min:80},
  {name:'LeBron James',    desc:'Primary playmaker who controls the offense and rarely turns it over.',        score:s=>{const pp=pct(s.passCmp,s.passAtt)??0,to=s.toUnf+s.toFrc;return(s.assists>=2?s.assists*15:0)+(pp>=80&&s.passAtt>10?pp*.4:0)-to*5;},min:40},
  {name:'Jayson Tatum',    desc:'Creates her own shot off the dribble and finishes at a high rate.',           score:s=>{const dA=s.dlAtt+s.drAtt,dS=s.dlSuc+s.drSuc,dp=pct(dS,dA)??0,sp=pct(s.goals,s.sog+s.soff)??0;return(s.goals>=2?sp*.6:0)+(dA>=2&&dp>=70?dp*.5:0);},min:60},
  {name:'Kyrie Irving',    desc:'Impossible to guard off the dribble — creates for herself and teammates.',    score:s=>{const dA=s.dlAtt+s.drAtt,dS=s.dlSuc+s.drSuc,dp=pct(dS,dA)??0;return(dA>=3&&dp>=70?dp*.8:0)+s.assists*6+s.gso*5;},min:60},
  {name:'Steph Curry',     desc:'Impossible to stay in front of — creates space off the dribble at will.',    score:s=>{const dA=s.dlAtt+s.drAtt,dS=s.dlSuc+s.drSuc,dp=pct(dS,dA)??0;return dA>=2?dp:0;},min:50},
  {name:'Chris Paul',      desc:'Elite court vision and clean ball control — keeps the offense flowing.',      score:s=>{const pp=pct(s.passCmp,s.passAtt)??0,to=s.toUnf+s.toFrc;return(pp>=85&&s.passAtt>8?pp:0)-to*8+s.fd*4;},min:60},
  {name:'Draymond Green',  desc:'Controls the possession battle — draw controls and hustle shape every game.', score:s=>{const dcT=s.dcWon+s.dcLost,dp=pct(s.dcWon,dcT)??0;return(s.dcWon>=8?s.dcWon*5:0)+(dp>=60&&dcT>=5?dp*.4:0)+s.gbWon*3+s.ct*6;},min:40},
  {name:'Marcus Smart',    desc:'Wins every loose ball and guards the toughest assignment on the field.',      score:s=>s.ct*10+s.ints*8+s.gbWon*4+s.dodgeBlk*6,min:25},
  {name:'Jimmy Butler',    desc:'Aggressive scorer who earns tough shots and gets to the line.',               score:s=>{const sp=pct(s.goals,s.sog+s.soff)??0;return(s.goals>=1?sp*.7:0)+s.fd*5+s.fpa*4;},min:40},
  {name:'Dennis Rodman',   desc:'The hustle plays change the game — wins every 50/50 ball nobody else wants.', score:s=>s.gbWon*8+s.dcWon*4,min:20},
  {name:'Rudy Gobert',     desc:'Anchors the defense in goal — makes key stops when it matters most.',         score:s=>{const sv=pct(s.saves,s.saves+s.goalsAllowed)??0;return s._pos==='G'?(s.saves*8+sv*.5):0;},min:10},
  {name:'Ben Simmons',     desc:'Elite distributor and defender who avoids putting pressure on the goal.',     score:s=>{const pp=pct(s.passCmp,s.passAtt)??0;return(pp>=80&&s.passAtt>5?pp*.3:0)+s.ct*5-s.goals*20;},min:15},
];

function assignComps(all){
  ROSTER.forEach(p=>{if(all[p.jersey])all[p.jersey]._pos=p.position;});
  const cands=[];
  ROSTER.forEach(p=>{
    const s=all[p.jersey];
    if(!(s.goals||s.assists||s.passAtt||s.dlAtt+s.drAtt||s.dcWon||s.gbWon||s.saves))return;
    COMPS.forEach((c,ci)=>{const sc=c.score(s);if(sc>=c.min)cands.push({j:p.jersey,ci,sc});});
  });
  cands.sort((a,b)=>b.sc-a.sc);
  const usedC=new Set(),usedP=new Set(),res={};
  cands.forEach(c=>{if(usedP.has(c.j)||usedC.has(c.ci))return;res[c.j]=COMPS[c.ci].name;usedC.add(c.ci);usedP.add(c.j);});
  return res;
}

function getBlurb(player,s){
  const pos=posN(player.position),dA=s.dlAtt+s.drAtt,dS=s.dlSuc+s.drSuc,to=s.toUnf+s.toFrc;
  const hasData=s.goals||s.assists||s.passAtt||dA||s.dcWon||s.gbWon||s.saves;
  if(!hasData)return{blurb:null,nba:null};
  const comp=COMPS.find(c=>c.name===nbaMap[player.jersey]);
  const nba=comp?`${comp.name} — ${comp.desc}`:null;
  if(pos==='G'){const sv=pct(s.saves,s.saves+s.goalsAllowed);if(!s.saves&&!s.goalsAllowed)return{blurb:null,nba:null};return{blurb:`Made ${s.saves} save${s.saves!==1?'s':''} on ${s.gsoAllowed} scoring opportunities, allowing ${s.goalsAllowed} goals${sv!==null?' ('+sv+'% save rate)':''}.`,nba};}
  const lines=[],pp=pct(s.passCmp,s.passAtt),sp=pct(s.goals,s.sog+s.soff),dp=pct(dS,dA),dcp=pct(s.dcWon,s.dcWon+s.dcLost),rat=to>0?(s.assists/to).toFixed(1):null;
  if(s.goals>0||s.assists>0)lines.push(`Scored ${s.goals}G + ${s.assists}A`+(s.sog+s.soff>0?` on ${sp}% shooting`:'')+'.');
  if(pp!==null&&s.passAtt>3)lines.push(`${pp}% pass completion (${s.passCmp}/${s.passAtt}).`);
  if(dA>0)lines.push(`${dp}% dodge success (${dS}/${dA}${dA>2&&s.dlAtt!==s.drAtt?', favors '+(s.dlAtt>s.drAtt?'left':'right'):''})`+'.');
  if(s.dcWon+s.dcLost>0)lines.push(`Won ${s.dcWon}/${s.dcWon+s.dcLost} draw controls (${dcp}%).`);
  if(s.gbWon>2)lines.push(`${s.gbWon} ground balls won.`);
  if(s.ct>1)lines.push(`${s.ct} caused turnovers.`);
  if(rat&&to>1)lines.push(`Ast/TO ratio: ${rat}.`);
  if(!lines.length)return{blurb:null,nba:null};
  return{blurb:lines.slice(0,3).join(' '),nba};
}

function onGameChange(){

function setFilter(f,btn){posFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');document.querySelectorAll('.card').forEach(c=>{c.style.display=(f==='ALL'||c.dataset.pos===f)?'':'none';});}

function buildGrid(){

function barRow(lbl,val,tot){const v=pct(val,tot);if(v===null)return '';return `<div class="bar-row"><div class="bar-lbl">${lbl}</div><div class="bar-track"><div class="bar-fill" style="width:${v}%;background:${bClr(v)}"></div></div><div class="bar-val" style="color:${bClr(v)}">${v}%</div></div>`;}
function atRow(a,to){if(!a&&!to)return '';const r=to>0?a/to:a,d=to===0?a+':0':r.toFixed(2),pe=to===0&&a>0?100:Math.min(100,Math.round(r/(r+1)*100)),c=r>=2?'#3fb950':r>=1?'#f0883e':'#f85149';return `<div class="bar-row"><div class="bar-lbl">Ast/TO ratio</div><div class="bar-track"><div class="bar-fill" style="width:${pe}%;background:${c}"></div></div><div class="bar-val" style="color:${c}">${d}</div></div>`;}

function buildCard(player,all){
  const s=all[player.jersey],pos=posN(player.position),isG=pos==='G';
  const dA=s.dlAtt+s.drAtt,dS=s.dlSuc+s.drSuc,lP=pct(s.dlSuc,s.dlAtt),rP=pct(s.drSuc,s.drAtt),oP=pct(dS,dA),to=s.toUnf+s.toFrc;
  const {blurb,nba}=getBlurb(player,s);
  const strip=isG?`<div class="goalie-strip"><div class="goalie-stat-row"><span class="goalie-lbl">Saves</span><span class="goalie-val">${s.saves}</span></div><div class="goalie-stat-row"><span class="goalie-lbl">Goals allowed</span><span class="goalie-val">${s.goalsAllowed}</span></div><div class="goalie-stat-row"><span class="goalie-lbl">Save %</span><span class="goalie-val" style="color:${bClr(pct(s.saves,s.saves+s.goalsAllowed))}">${pct(s.saves,s.saves+s.goalsAllowed)??'—'}${pct(s.saves,s.saves+s.goalsAllowed)!==null?'%':''}</span></div><div class="goalie-stat-row"><span class="goalie-lbl">GSO allowed</span><span class="goalie-val">${s.gsoAllowed}</span></div></div>`:`<div class="stat-strip cols-4"><div class="stat-box"><div class="stat-val">${s.goals}</div><div class="stat-lbl">Goals</div></div><div class="stat-box"><div class="stat-val">${s.assists}</div><div class="stat-lbl">Assists</div></div><div class="stat-box"><div class="stat-val">${s.gbWon}</div><div class="stat-lbl">GBs</div></div><div class="stat-box"><div class="stat-val">${s.ct+s.ints}</div><div class="stat-lbl">CT+Int</div></div></div>`;
  const bars=isG?'':(`<div class="pct-section"><div class="pct-section-lbl">Skill efficiency</div>${barRow('Shot %',s.goals,s.sog+s.soff)}${barRow('Pass %',s.passCmp,s.passAtt)}${barRow('Draw ctrl %',s.dcWon,s.dcWon+s.dcLost)}${atRow(s.assists,to)}</div>`);
  const dodge=dA>0?`<div class="dodge-section"><div class="bar-row"><div class="bar-lbl">Dodge (overall)</div><div class="bar-track"><div class="bar-fill" style="width:${oP??0}%;background:${bClr(oP)}"></div></div><div class="bar-val" style="color:${bClr(oP)}">${oP??'—'}${oP!==null?'%':''}</div></div><button class="dodge-expand-btn" onclick="toggleDodge(event,${player.jersey})"><span id="da_${player.jersey}">▸</span> Left / Right breakdown</button><div class="dodge-detail" id="dd_${player.jersey}"><div class="dodge-dir-grid"><div class="dodge-dir"><div class="dodge-dir-lbl">← Going left</div><div class="dodge-dir-pct" style="color:${bClr(lP)}">${lP??'—'}${lP!==null?'%':''}</div><div class="dodge-dir-sub">${s.dlSuc}/${s.dlAtt} att.</div><div class="dodge-dir-bar" style="background:${bClr(lP)};width:${Math.min(lP??0,100)}%"></div></div><div class="dodge-dir"><div class="dodge-dir-lbl">→ Going right</div><div class="dodge-dir-pct" style="color:${bClr(rP)}">${rP??'—'}${rP!==null?'%':''}</div><div class="dodge-dir-sub">${s.drSuc}/${s.drAtt} att.</div><div class="dodge-dir-bar" style="background:${bClr(rP)};width:${Math.min(rP??0,100)}%"></div></div></div>${dA>1&&s.dlAtt!==s.drAtt?`<div class="tendency">Tendency: favors going <strong>${s.dlAtt>s.drAtt?'left':'right'}</strong> (${Math.max(s.dlAtt,s.drAtt)}/${dA} att.)</div>`:''}</div></div>`:'';
  const fd=`<div class="fd-grid"><div class="fd-col"><div class="fd-section-hdr">Offense</div><div class="fd-row"><span class="fd-lbl">Goals</span><span class="fd-val">${s.goals}</span></div><div class="fd-row"><span class="fd-lbl">Assists</span><span class="fd-val">${s.assists}</span></div><div class="fd-row"><span class="fd-lbl">Shots on goal</span><span class="fd-val">${s.sog}</span></div><div class="fd-row"><span class="fd-lbl">Shots off goal</span><span class="fd-val">${s.soff}</span></div><div class="fd-row"><span class="fd-lbl">Free pos.</span><span class="fd-val">${s.fpg}/${s.fpa}</span></div><div class="fd-row"><span class="fd-lbl">GSO created</span><span class="fd-val">${s.gso}</span></div><div class="fd-section-hdr" style="margin-top:8px">Passing</div><div class="fd-row"><span class="fd-lbl">Completed</span><span class="fd-val">${s.passCmp}/${s.passAtt}</span></div><div class="fd-row"><span class="fd-lbl">Drops</span><span class="fd-val">${s.drops}</span></div><div class="fd-row"><span class="fd-lbl">Unforced TO</span><span class="fd-val">${s.toUnf}</span></div><div class="fd-row"><span class="fd-lbl">Forced TO</span><span class="fd-val">${s.toFrc}</span></div><div class="fd-row"><span class="fd-lbl">Fouls drawn</span><span class="fd-val">${s.fd}</span></div></div><div class="fd-col"><div class="fd-section-hdr">Defense & hustle</div><div class="fd-row"><span class="fd-lbl">Caused TOs</span><span class="fd-val">${s.ct}</span></div><div class="fd-row"><span class="fd-lbl">Interceptions</span><span class="fd-val">${s.ints}</span></div><div class="fd-row"><span class="fd-lbl">GB won/lost</span><span class="fd-val">${s.gbWon}/${s.gbLost}</span></div><div class="fd-row"><span class="fd-lbl">Dodge blk/faced</span><span class="fd-val">${s.dodgeBlk}/${s.dodgeOn}</span></div><div class="fd-row"><span class="fd-lbl">Clears</span><span class="fd-val">${s.clrSuc}/${s.clrAtt}</span></div><div class="fd-row"><span class="fd-lbl">Draw controls</span><span class="fd-val">${s.dcWon}W ${s.dcLost}L</span></div><div class="fd-section-hdr" style="margin-top:8px">Discipline</div><div class="fd-row"><span class="fd-lbl">Fouls committed</span><span class="fd-val">${s.fouls}</span></div><div class="fd-row"><span class="fd-lbl">Yellow cards</span><span class="fd-val">${s.yellowCards}</span></div>${s.saves||s.goalsAllowed?`<div class="fd-section-hdr" style="margin-top:8px">Goalie</div><div class="fd-row"><span class="fd-lbl">Saves</span><span class="fd-val">${s.saves}</span></div><div class="fd-row"><span class="fd-lbl">Goals allowed</span><span class="fd-val">${s.goalsAllowed}</span></div><div class="fd-row"><span class="fd-lbl">GSO allowed</span><span class="fd-val">${s.gsoAllowed}</span></div>`:''}</div></div>`;
  return `<div class="card" data-pos="${pos}" data-jersey="${player.jersey}" id="card_${player.jersey}"><div class="card-header"><div class="avatar av-${pos}">${ini(player.name)}</div><div><div class="card-name">#${player.jersey} ${player.name}<span class="pos-pill pill-${pos}">${posL(player.position)}</span></div><div class="card-sub">Class of ${player.grad_year} · ${player.hand}-handed</div></div></div>${blurb?`<div class="blurb"><div class="blurb-text">${blurb}</div>${nba?`<div class="nba-comp">NBA comp: <span>${nba}</span></div>`:''}</div>`:''}<div class="radar-wrap"><canvas id="radar_${player.jersey}" height="170"></canvas></div>${strip}${bars}${dodge}<button class="expand-btn" id="expBtn_${player.jersey}" onclick="toggleDetail(event,${player.jersey})">All stats ▾</button><div class="full-detail" id="det_${player.jersey}">${fd}</div></div>`;
}

function drawRadar(player,all){
  const s=all[player.jersey],pos=posN(player.position),isG=pos==='G';
  const dA=s.dlAtt+s.drAtt,dS=s.dlSuc+s.drSuc,to=s.toUnf+s.toFrc,atR=to>0?s.assists/to:(s.assists>0?2:0),atSc=Math.min(100,Math.round(atR*40));
  const data=isG?[pct(s.saves,s.saves+s.goalsAllowed)??0,pct(s.passCmp,s.passAtt)??0,0,0,0]:[pct(s.goals,s.sog+s.soff)??0,pct(s.passCmp,s.passAtt)??0,pct(dS,dA)??0,pct(s.dcWon,s.dcWon+s.dcLost)??0,atSc];
  const labels=isG?['Save %','Pass %','—','—','—']:['Shot %','Pass %','Dodge %','Draw ctrl %','Ast/TO'];
  const color={M:'#3fb950',A:'#ff8c00',D:'#58a6ff',G:'#d2a8ff'}[pos]||'#58a6ff';
  const canvas=document.getElementById('radar_'+player.jersey);if(!canvas)return;
  if(rCharts[player.jersey])rCharts[player.jersey].destroy();
  rCharts[player.jersey]=new Chart(canvas,{type:'radar',data:{labels,datasets:[{data,backgroundColor:color+'18',borderColor:color,borderWidth:1.5,pointBackgroundColor:color,pointRadius:3}]},options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.raw+(ctx.label==='Ast/TO'?' (scaled)':'%')}}},scales:{r:{min:0,max:100,ticks:{display:false},grid:{color:'rgba(255,255,255,.07)'},angleLines:{color:'rgba(255,255,255,.07)'},pointLabels:{color:'#8b949e',font:{size:9.5}}}}}});
}
function toggleDodge(e,j){e.stopPropagation();const d=document.getElementById('dd_'+j),a=document.getElementById('da_'+j),o=d.classList.toggle('open');a.textContent=o?'▾':'▸';}
function toggleDetail(e,j){e.stopPropagation();const d=document.getElementById('det_'+j),b=document.getElementById('expBtn_'+j),c=document.getElementById('card_'+j),o=d.classList.toggle('open');b.textContent=o?'Hide stats ▴':'All stats ▾';c.classList.toggle('expanded',o);}

// ── MODAL ─────────────────────────────────────────────────────────────────────
const SF=[{k:'goals',l:'G'},{k:'assists',l:'A'},{k:'sog',l:'SOG'},{k:'soff',l:'S-off'},{k:'dlAtt',l:'DL-A'},{k:'dlSuc',l:'DL-S'},{k:'drAtt',l:'DR-A'},{k:'drSuc',l:'DR-S'},{k:'passAtt',l:'Pas-A'},{k:'passCmp',l:'Pas-C'},{k:'drops',l:'Drop'},{k:'toUnf',l:'TO-U'},{k:'toFrc',l:'TO-F'},{k:'gbWon',l:'GB-W'},{k:'gbLost',l:'GB-L'},{k:'dcWon',l:'DC-W'},{k:'dcLost',l:'DC-L'},{k:'ct',l:'CT'},{k:'fouls',l:'Fls'},{k:'clrAtt',l:'Clr-A'},{k:'clrSuc',l:'Clr-S'},{k:'saves',l:'Sav'},{k:'goalsAllowed',l:'GA'},{k:'gsoAllowed',l:'GSO-A'}];
const EZ=['fpa','fpg','ints','dodgeOn','dodgeBlk','yellowCards','fd','gso'];

function buildPRows(existing){

}
function readStats(){
  const out={};
  ROSTER.forEach(p=>{const s={};SF.forEach(f=>{const el=document.getElementById('nf_'+p.jersey+'_'+f.k);s[f.k]=parseInt(el?.value)||0;});EZ.forEach(k=>s[k]=0);out[p.jersey]=s;});

async function saveGame(){
  const opp=document.getElementById('fOpp').value.trim(),date=document.getElementById('fDate').value,result=document.getElementById('fResult').value.trim();
  if(!opp||!date||!result){setMsg('Fill in opponent, date, and result.','err');return;}
  const btn=document.getElementById('saveBtn');btn.disabled=true;btn.textContent='Saving...';
  try {
    const stats=readStats();
    if(editId){
      await db.patch('games',`id=eq.${editId}`,{opponent:opp,date,result});
      await db.del('player_stats',`game_id=eq.${editId}`);
      await db.post('player_stats',ROSTER.map(p=>toRow(p.jersey,editId,stats[p.jersey])),'');
      toast('Game updated!');
    } else {
      const [g]=await db.post('games',{opponent:opp,date,result,season:'2025-26'});
      await db.post('player_stats',ROSTER.map(p=>toRow(p.jersey,g.id,stats[p.jersey])),'');
      toast('Game added!');
    }
    closeModal();await refresh();
  } catch(e){setMsg('Error: '+e.message,'err');}
  finally{btn.disabled=false;btn.textContent='Save game';}
}
async function deleteSelected(){
  const v=document.getElementById('gameSelect').value;if(v==='season')return;
  const g=GAMES[parseInt(v)];
  if(!confirm(`Delete game vs ${g.opponent} (${g.date})? This cannot be undone.`))return;
  try{await db.del('games',`id=eq.${g.id}`);toast('Game deleted.');await refresh();}catch(e){toast('Error: '+e.message,'error');}
}
async function deleteFromModal(){
  if(!editId)return;const g=GAMES.find(x=>x.id===editId);
  if(!confirm(`Delete game vs ${g?.opponent}? This cannot be undone.`))return;
  try{await db.del('games',`id=eq.${editId}`);toast('Game deleted.');closeModal();await refresh();}catch(e){toast('Error: '+e.message,'error');}
}
function closeModal(){document.getElementById('modalBg').classList.remove('open');}
function handleModalBgClick(e){if(e.target===document.getElementById('modalBg'))closeModal();}
function setMsg(msg,type){const el=document.getElementById('modalMsg');el.textContent=msg;el.className='modal-msg '+type;}

// ── BOOT ──────────────────────────────────────────────────────────────────────
if(sessionStorage.getItem('lax_auth')==='1'){
  document.getElementById('authScreen').style.display='none';
  document.getElementById('loadScreen').style.display='flex';
  initApp();
}
</script>
